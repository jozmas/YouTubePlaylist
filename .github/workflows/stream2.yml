name: YouTube Live Stream - Word of the Lord

on:
  workflow_dispatch:
  schedule:
    - cron: '53 20 * * *' # 21:53 nášho času

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout kódu
        uses: actions/checkout@v4

      - name: Príprava prostredia
        run: |
          sudo apt-get update
          sudo apt-get install -y curl
          ffmpeg -version

      - name: Stiahnutie videa
        run: |
          URL="https://www.dropbox.com/scl/fi/fmu96nc0hlmh3vz0v8cxu/wotldaily.mp4?rlkey=0fwtwxzn597kvjab8i7a614u3&st=217qa7na&raw=1"
          curl -L "$URL" -o video.mp4

      - name: Streamovanie na YouTube (Kanal 2)
        env:
          YOUTUBE_KEY: ${{ secrets.YOUTUBE_STREAM_KEY_2 }}
        run: |
          while true; do
            ffmpeg -re -stream_loop -1 -i video.mp4 \
            -map 0:v:0 -map 0:a:0 \
            -vf "scale=1920:1080,format=yuv420p" \
            -r 30 \
            -c:v libx264 -preset veryfast -tune film \
            -b:v 6000k -maxrate 6000k -bufsize 12000k \
            -pix_fmt yuv420p -g 60 \
            -c:a aac -b:a 128k -ac 2 \
            -f flv "rtmp://a.rtmp.youtube.com/live/$YOUTUBE_KEY" || echo "
