name: YouTube Live Stream - Word of the Lord

on:
  workflow_dispatch:
  schedule:
    - cron: '43 19 * * *' # Štart o 20:43 nášho času

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    # Povolenie zápisu pre GitHub Actions, aby mohol aktualizovať repozitár
    permissions:
      contents: write

    steps:
      - name: Checkout kódu
        uses: actions/checkout@v4

      - name: Príprava prostredia (Inštalácia FFmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg curl
          ffmpeg -version

      - name: Stiahnutie videa
        run: |
          URL="https://www.dropbox.com/scl/fi/fmu96nc0hlmh3vz0v8cxu/wotldaily.mp4?rlkey=0fwtwxzn597kvjab8i7a614u3&st=217qa7na&raw=1"
          curl -L "$URL" -o video.mp4

      - name: Streamovanie na YouTube (Kanal 2)
        env:
          YOUTUBE_KEY: ${{ secrets.YOUTUBE_STREAM_KEY_2 }}
        run: |
          # Použitie -nostdin a live2 pre maximálnu stabilitu automatiky
          ffmpeg -nostdin -re -stream_loop -1 -i video.mp4 \
          -map 0:v:0 -map 0:a:0 \
          -vf "scale=1920:1080:force_original_aspect_ratio=decrease,pad=1920:1080:(ow-iw)/2:(oh-ih)/2,format=yuv420p" \
          -r 30 \
          -c:v libx264 -preset ultrafast -tune film \
          -b:v 6000k -minrate 6000k -maxrate 6000k -bufsize 30000k \
          -g 60 -keyint_min 60 -sc_threshold 0 \
          -threads 1 -profile:v high -level 4.1 -bf 0 \
          -x264-params "nal-hrd=cbr:force-cfr=1" \
          -af "volume=0.2,aresample=44100" \
          -c:a aac -b:a 128k -ac 2 \
          -f flv "rtmp://a.rtmp.youtube.com/live2/$YOUTUBE_KEY"

      - name: Udržanie repozitára aktívneho (Keep-alive)
        if: always() # Spustí sa aj pri manuálnom zastavení alebo chybe
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          echo "Posledný stream (WOTL) ukončený: $(date)" > last_run_word.txt
          git add last_run_word.txt
          git commit -m "Údržba: Aktualizácia aktivity streamu $(date)" || exit 0
          git push
