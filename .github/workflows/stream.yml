name: YouTube Live Stream

on:
  workflow_dispatch:
  schedule:
    # Tento cron výraz spustí stream každý deň o 19:00 UTC
    - cron: '0 19 * * *'

jobs:
  stream:
    runs-on: ubuntu-latest

    steps:
      - name: Kontrola prostredia
        run: |
          ffmpeg -version
          curl --version

      - name: Stiahnutie videa z Google Drive
        run: |
          FILE_ID="1ZcsuqfFT-HcRg0luL8Q_4oHh_L1EhYEn"
          echo "Sťahujem video z Google Drive..."
          
          # Získanie potvrdenia pre veľké súbory
          CONFIRM=$(curl -sc /tmp/gcookie "https://docs.google.com/uc?export=download&id=${FILE_ID}" | sed -rn 's/.*confirm=([0-9A-Za-z_]+).*/\1/p')
          
          # Samotné stiahnutie
          curl -Lb /tmp/gcookie "https://docs.google.com/uc?export=download&confirm=${CONFIRM}&id=${FILE_ID}" -o video.mp4
          
          if [ ! -s video.mp4 ] || grep -q "<!DOCTYPE html>" video.mp4; then
            echo "CHYBA: Súbor sa nepodarilo stiahnuť (stiahlo sa HTML alebo prázdny súbor)!"
            exit 1
          fi
          
          echo "Súbor úspešne stiahnutý. Veľkosť:"
          du -sh video.mp4

      - name: Streamovanie na YouTube
        env:
          YOUTUBE_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          if [ -z "$YOUTUBE_KEY" ]; then
            echo "CHYBA: YOUTUBE_STREAM_KEY chýba v GitHub Secrets!"
            exit 1
          fi

          echo "Spúšťam stream..."
          
          # Optimalizované pre rýchly štart a stabilitu
          ffmpeg -re -stream_loop -1 -i video.mp4 \
          -f lavfi -i anullsrc=channel_layout=stereo:sample_rate=44100 \
          -map 0:v:0 -map 1:a:0 \
          -c:v libx264 -preset veryfast -b:v 3000k -maxrate 3000k -bufsize 6000k \
          -profile:v main -level 4.1 -bf 0 -pix_fmt yuv420p \
          -r 30 -g 60 -keyint_min 60 -sc_threshold 0 \
          -c:a aac -b:a 128k -ar 44100 -ac 2 \
          -f flv "rtmp://a.rtmp.youtube.com/live2/$YOUTUBE_KEY"
