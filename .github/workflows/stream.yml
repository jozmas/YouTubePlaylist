name: YouTube Live Stream

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest

    steps:
      - name: Inštalácia FFmpeg a nástrojov
        run: |
          sudo apt update
          sudo apt install -y ffmpeg curl grep sed

      - name: Stiahnutie videa z Google Drive
        run: |
          # ID tvojho súboru
          FILE_ID="1ZcsuqfFT-HcRg0luL8Q_4oHh_L1EhYEn"
          
          echo "Sťahujem video z Google Drive..."
          
          # 1. Získanie potvrdzovacieho tokenu (pre veľké súbory)
          CONFIRM=$(curl -sL "https://docs.google.com/uc?export=download&id=${FILE_ID}" | grep -o 'confirm=[^&"]*' | sed 's/confirm=//')
          
          if [ -z "$CONFIRM" ]; then
            # Ak nie je potrebný confirm token, stiahni priamo
            curl -L "https://docs.google.com/uc?export=download&id=${FILE_ID}" -o video.mp4
          else
            # Ak je potrebný confirm token, použi ho
            curl -L "https://docs.google.com/uc?export=download&id=${FILE_ID}&confirm=${CONFIRM}" -o video.mp4
          fi
          
          # Kontrola typu súboru
          FILE_TYPE=$(file video.mp4)
          echo "Detegovaný typ: $FILE_TYPE"
          
          if [[ "$FILE_TYPE" != *"ISO Media"* && "$FILE_TYPE" != *"MP4"* ]]; then
            echo "CHYBA: Sťahovanie zlyhalo. Google Drive pravdepodobne vyžaduje prihlásenie alebo je odkaz nesprávny."
            ls -lh video.mp4
            exit 1
          fi

      - name: Streamovanie na YouTube
        env:
          YOUTUBE_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          if [ -z "$YOUTUBE_KEY" ]; then
            echo "CHYBA: YOUTUBE_STREAM_KEY nie je nastavený v GitHub Secrets!"
            exit 1
          fi

          echo "Spúšťam stream na YouTube..."
          
          # Parametre optimalizované pre YouTube Live
          # -re (read at native frame rate)
          # -stream_loop -1 (nekonečná slučka)
          ffmpeg -re -stream_loop -1 -i video.mp4 \
          -c:v libx264 -preset veryfast -b:v 3500k -maxrate 3500k -bufsize 7000k \
          -pix_fmt yuv420p -g 60 -c:a aac -b:a 128k -ar 44100 \
          -f flv "rtmp://a.rtmp.youtube.com/live2/$YOUTUBE_KEY"
