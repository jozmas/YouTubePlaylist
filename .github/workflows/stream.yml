name: YouTube Live Stream

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest

    steps:
      - name: Inštalácia FFmpeg a nástrojov
        run: |
          sudo apt update
          sudo apt install -y ffmpeg curl megatools

      - name: Stiahnutie videa z Mega.nz
        run: |
          # Použitie megadl, čo je najľahší klient pre priame odkazy
          URL="https://mega.nz/file/4lF02CIQ#LngN-QNggUSnI0mgBXv1-_TIp-UtoXQF3oztRq6IbcU"
          
          echo "Sťahujem video z Mega.nz..."
          # megadl stiahne súbor pod jeho originálnym názvom
          megadl "$URL" || { echo "Sťahovanie zlyhalo"; exit 1; }
          
          # Dynamické nájdenie stiahnutého video súboru a premenovanie
          VIDEO_FILE=$(ls | grep -Ei "\.(mp4|mkv|avi|mov|flv)$" | head -n 1)
          
          if [ -z "$VIDEO_FILE" ]; then
            echo "CHYBA: Žiadne video sa nestiahlo!"
            ls -la
            exit 1
          fi
          
          mv "$VIDEO_FILE" video.mp4
          
          # Overenie veľkosti (musí byť viac ako 0)
          SIZE=$(stat -c%s video.mp4)
          echo "Veľkosť súboru: $SIZE bajtov"
          
          if [ "$SIZE" -lt 1000000 ]; then
            echo "CHYBA: Súbor je príliš malý alebo poškodený!"
            exit 1
          fi

      - name: Streamovanie na YouTube
        env:
          YOUTUBE_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          if [ -z "$YOUTUBE_KEY" ]; then
            echo "CHYBA: YOUTUBE_STREAM_KEY chýba v GitHub Secrets!"
            exit 1
          fi

          echo "Spúšťam stream na YouTube..."
          
          # Pridaný -analyzeduration a -probesize pre lepšiu detekciu moov atomu pri štarte
          ffmpeg -re -stream_loop -1 \
          -analyzeduration 100M -probesize 100M \
          -i video.mp4 \
          -c:v libx264 -preset veryfast -b:v 3000k -maxrate 3000k -bufsize 6000k \
          -pix_fmt yuv420p -g 50 -c:a aac -b:a 128k -ar 44100 \
          -f flv "rtmp://a.rtmp.youtube.com/live2/$YOUTUBE_KEY"
