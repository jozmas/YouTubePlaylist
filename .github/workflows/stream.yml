name: YouTube Live Stream

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest

    steps:
      - name: Inštalácia FFmpeg a Megatools
        run: |
          sudo apt update
          sudo apt install -y ffmpeg megatools

      - name: Stiahnutie videa z Mega.nz
        run: |
          # Odkaz na súbor (musí byť v úvodzovkách)
          MEGA_LINK="https://mega.nz/file/4lF02CIQ#LngN-QNggUSnI0mgBXv1-_TIp-UtoXQF3oztRq6IbcU"
          
          echo "Sťahujem video z Mega.nz..."
          
          # Stiahnutie súboru do aktuálneho priečinka
          megadl "$MEGA_LINK" --path .
          
          # Počkáme sekundu na zápis na disk
          sleep 2
          
          # Hľadáme stiahnutý súbor (megadl zachováva pôvodný názov z Mega)
          # Odfiltrujeme stream.yml a hľadáme mediálne prípony
          STIAHNUTY_SUBOR=$(ls | grep -Ei "\.(mp4|mkv|avi|mov)$" | head -n 1)
          
          if [ -z "$STIAHNUTY_SUBOR" ]; then
            echo "-------------------------------------------------------"
            echo "CHYBA: Súbor sa nepodarilo stiahnuť z Mega.nz!"
            echo "Skontroluj, či je odkaz stále platný."
            echo "Obsah priečinka pre kontrolu:"
            ls -R
            echo "-------------------------------------------------------"
            exit 1
          fi
          
          echo "Našiel sa súbor: $STIAHNUTY_SUBOR. Premenovávam na video.mp4"
          mv "$STIAHNUTY_SUBOR" video.mp4
          
          # Kontrola veľkosti a integrity
          FILE_SIZE=$(du -m video.mp4 | cut -f1)
          echo "Veľkosť súboru: ${FILE_SIZE} MB"
          
          if [ "$FILE_SIZE" -lt 1 ]; then
            echo "CHYBA: Stiahnutý súbor je prázdny alebo príliš malý!"
            exit 1
          fi
          
          FILE_TYPE=$(file video.mp4)
          echo "Detegovaný typ: $FILE_TYPE"

      - name: Streamovanie na YouTube
        env:
          YOUTUBE_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          if [ -z "$YOUTUBE_KEY" ]; then
            echo "CHYBA: YOUTUBE_STREAM_KEY nie je nastavený v GitHub Secrets!"
            exit 1
          fi

          echo "Spúšťam stream na YouTube..."
          
          # FFmpeg nastavený na RTMP vysielanie
          ffmpeg -re -stream_loop -1 -i video.mp4 \
          -c:v libx264 -preset veryfast -b:v 3000k -maxrate 3000k -bufsize 6000k \
          -pix_fmt yuv420p -g 50 -c:a aac -b:a 128k -ar 44100 \
          -f flv "rtmp://a.rtmp.youtube.com/live2/$YOUTUBE_KEY"
