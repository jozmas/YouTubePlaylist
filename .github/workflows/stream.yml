name: YouTube Live Stream

# Tento trigger umožňuje manuálne spustenie streamu priamo z prostredia GitHub (v záložke Actions)
on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest

    steps:
      - name: Inštalácia FFmpeg a wget
        run: |
          sudo apt update
          sudo apt install -y ffmpeg wget

      - name: Stiahnutie videa z Dropboxu
        run: |
          # Používame tvoj odkaz, ale s dl=1 na konci pre priame stiahnutie súboru
          wget -O video.mp4 "https://www.dropbox.com/scl/fi/lnezxmekrohf1k2g7jd2z/stream.mp4?rlkey=cjns4lvwbfd2vo5m2uirzhikz&st=z1dq0dwk&dl=1"

      - name: Streamovanie na YouTube
        env:
          # Streamovací kľúč sa ťahá z GitHub Secrets
          YOUTUBE_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          # Vypíšeme informáciu o štarte
          echo "Spúšťam stream na YouTube..."
          
          # FFmpeg príkaz na streamovanie
          # -re : číta vstup v reálnom čase (veľmi dôležité pre stream)
          # -stream_loop -1 : video sa bude opakovať donekonečna (zmaž toto, ak chceš prehrať video len raz)
          ffmpeg -re -stream_loop -1 -i video.mp4 \
          -c:v libx264 -preset veryfast -b:v 3000k -maxrate 3000k -bufsize 6000k \
          -pix_fmt yuv420p -g 50 \
          -c:a aac -b:a 160k -ar 44100 \
          -f flv "rtmp://a.rtmp.youtube.com/live2/$YOUTUBE_KEY"
