name: YouTube Live Stream

on:
  workflow_dispatch:
  schedule:
    - cron: '0 19 * * *'

jobs:
  stream:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kódu
        uses: actions/checkout@v4

      - name: Inštalácia FFmpeg
        run: |
          # Použijeme systémový FFmpeg, ktorý je pre toto prostredie najstabilnejší
          sudo apt-get update
          sudo apt-get install -y ffmpeg curl

      - name: Stiahnutie videa
        run: |
          URL="https://www.dropbox.com/scl/fi/lnezxmekrohf1k2g7jd2z/stream.mp4?rlkey=cjns4lvwbfd2vo5m2uirzhikz&st=184iyk1p&dl=1"
          
          echo "Sťahujem video z Dropboxu (377 MB)..."
          curl -L "$URL" -o video.mp4
          
          FILE_SIZE=$(stat -c%s "video.mp4")
          if [ "$FILE_SIZE" -lt 10000000 ]; then
            echo "CHYBA: Súbor je príliš malý. Sťahovanie zlyhalo."
            exit 1
          fi
          echo "Video stiahnuté."

      - name: Streamovanie na YouTube
        env:
          YOUTUBE_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          if [ -z "$YOUTUBE_KEY" ]; then
            echo "CHYBA: YOUTUBE_STREAM_KEY chýba v GitHub Secrets!"
            exit 1
          fi

          echo "Spúšťam stream na YouTube (Vynútenie verejnej viditeľnosti)..."
          
          # ÚPRAVY PRE VIDITEĽNOSŤ NA KANÁLI:
          # 1. -tune zerolatency: Simuluje okamžitý štart OBS.
          # 2. -movflags +faststart: Zabezpečí, aby YouTube mohol čítať metadáta okamžite.
          # 3. Zmena na rtmp:// (nie rtmps) pre stabilnejší handshake z GitHubu.
          # 4. Pridané metadata pre kódovanie.
          
          ffmpeg -re -stream_loop -1 -i video.mp4 \
          -map 0:v:0 -map 0:a:0 \
          -c:v libx264 -preset veryfast -tune zerolatency -b:v 3000k -maxrate 3000k -bufsize 6000k \
          -profile:v main -level 4.1 -bf 0 -pix_fmt yuv420p \
          -g 50 -keyint_min 50 -sc_threshold 0 \
          -x264-params "nal-hrd=cbr:force-cfr=1" \
          -af "volume=0.2" \
          -c:a aac -b:a 128k -ar 44100 -ac 2 \
          -metadata title="Relaxing Nature Sounds" \
          -f flv "rtmp://a.rtmp.youtube.com/live2/$YOUTUBE_KEY"
