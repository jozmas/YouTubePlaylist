name: YouTube Stream with Backup and Google Drive

on:
  workflow_dispatch:        # manuálne spustenie
  schedule:
    - cron: '0 19 * * *'   # každý deň o 19:00 UTC

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # max 6 hodín

    steps:
      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y ffmpeg python3-pip
          pip install gdown

      - name: Download video from Google Drive
        run: |
          echo "Downloading video from Google Drive..."
          gdown https://drive.google.com/uc?id=1eC281UQ9hHzzX3Zy6zl_l4IiQo9e3rmN -O video.mp4

      - name: Validate downloaded video
        run: |
          echo "Checking if video.mp4 is valid MP4..."
          file_type=$(file --mime-type -b video.mp4)
          echo "Detected file type: $file_type"
          if [ "$file_type" != "video/mp4" ]; then
            echo "Error: downloaded file is not a valid MP4!"
            exit 1
          fi
          ls -lh video.mp4

      - name: Start streaming (main server)
        run: |
          ffmpeg -re -stream_loop -1 -i video.mp4 \
          -c:v libx264 -preset veryfast -pix_fmt yuv420p \
          -c:a aac -b:a 128k \
          -f flv "rtmp://a.rtmp.youtube.com/live2/${{ secrets.YT_STREAM_KEY }}"

      - name: Start streaming (backup server)
        run: |
          ffmpeg -re -stream_loop -1 -i video.mp4 \
          -c:v libx264 -preset veryfast -pix_fmt yuv420p \
          -c:a aac -b:a 128k \
          -f flv "rtmp://b.rtmp.youtube.com/live2/${{ secrets.YT_STREAM_KEY }}?backup=1"
