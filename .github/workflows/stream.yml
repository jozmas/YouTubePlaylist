name: MANUALNY VODOPAD TEST

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalacia FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Stiahnutie a kontrola
        run: |
          # Pouzijeme iny vodopad, aby sme vylucili chybu prveho
          URL="https://www.dropbox.com/scl/fi/kp8qyithsqs2nfonpp1gk/waterfall-stream.mp4?rlkey=caaon46glrb6amltbq8apdlr0&raw=1"
          curl -L "$URL" -o "final_video.mp4"
          
          echo "KONTROLA SUBORU:"
          ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 final_video.mp4

      - name: Streamovanie
        env:
          YOUTUBE_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          # Pridali sme -ignore_unknown a -re pre stabilitu
          ffmpeg -re -stream_loop -1 -i final_video.mp4 \
          -c:v libx264 -preset ultrafast -b:v 4500k \
          -maxrate 4500k -bufsize 9000k -pix_fmt yuv420p \
          -g 60 -f flv "rtmp://a.rtmp.youtube.com/live2/$YOUTUBE_KEY"
