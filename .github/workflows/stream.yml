name: YouTube Live Stream

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest

    steps:
      - name: Inštalácia FFmpeg a Python nástrojov
        run: |
          sudo apt update
          sudo apt install -y ffmpeg python3-pip
          pip3 install mega.py

      - name: Stiahnutie videa z Mega.nz
        run: |
          python3 - <<EOF
          from mega import Mega
          import os

          mega = Mega()
          # Prihlásenie ako anonymný používateľ
          m = mega.login()
          
          url = "https://mega.nz/file/4lF02CIQ#LngN-QNggUSnI0mgBXv1-_TIp-UtoXQF3oztRq6IbcU"
          print(f"Sťahujem video z: {url}")
          
          # Stiahnutie súboru
          file_path = m.download_url(url)
          
          # Premenovanie na video.mp4 pre FFmpeg
          if os.path.exists(file_path):
              os.rename(file_path, 'video.mp4')
              print(f"Súbor úspešne stiahnutý a premenovaný na video.mp4")
          else:
              print("Chyba: Súbor sa nepodarilo stiahnuť.")
              exit(1)
          EOF

      - name: Kontrola stiahnutého súboru
        run: |
          if [ ! -f video.mp4 ]; then
            echo "CHYBA: Súbor video.mp4 neexistuje!"
            exit 1
          fi
          FILE_SIZE=$(ls -lh video.mp4)
          echo "Veľkosť súboru: $FILE_SIZE"
          file video.mp4

      - name: Streamovanie na YouTube
        env:
          YOUTUBE_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          if [ -z "$YOUTUBE_KEY" ]; then
            echo "CHYBA: YOUTUBE_STREAM_KEY nie je nastavený v GitHub Secrets!"
            exit 1
          fi

          echo "Spúšťam stream na YouTube..."
          
          # FFmpeg nastavený na RTMP vysielanie
          ffmpeg -re -stream_loop -1 -i video.mp4 \
          -c:v libx264 -preset veryfast -b:v 3000k -maxrate 3000k -bufsize 6000k \
          -pix_fmt yuv420p -g 50 -c:a aac -b:a 128k -ar 44100 \
          -f flv "rtmp://a.rtmp.youtube.com/live2/$YOUTUBE_KEY"
