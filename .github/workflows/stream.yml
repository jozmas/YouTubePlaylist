name: YouTube Live Stream

on:
  workflow_dispatch:
  schedule:
    # Spustenie každý deň o 19:00 UTC
    - cron: '0 19 * * *'

jobs:
  stream:
    runs-on: ubuntu-latest

    steps:
      - name: Kontrola prostredia
        run: |
          ffmpeg -version
          curl --version

      - name: Stiahnutie videa z Dropboxu
        run: |
          # Pôvodný odkaz: https://www.dropbox.com/scl/fi/lnezxmekrohf1k2g7jd2z/stream.mp4?rlkey=cjns4lvwbfd2vo5m2uirzhikz&st=sw68njm4&dl=0
          # Upravený odkaz pre priame stiahnutie (dl=1)
          URL="https://www.dropbox.com/scl/fi/lnezxmekrohf1k2g7jd2z/stream.mp4?rlkey=cjns4lvwbfd2vo5m2uirzhikz&st=sw68njm4&dl=1"
          
          echo "Sťahujem video z Dropboxu..."
          curl -L "$URL" -o video.mp4
          
          if [ ! -s video.mp4 ]; then
            echo "CHYBA: Súbor sa nepodarilo stiahnuť z Dropboxu!"
            exit 1
          fi
          
          echo "Súbor úspešne stiahnutý. Veľkosť:"
          du -sh video.mp4

      - name: Streamovanie na YouTube
        env:
          YOUTUBE_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          if [ -z "$YOUTUBE_KEY" ]; then
            echo "CHYBA: YOUTUBE_STREAM_KEY chýba v GitHub Secrets!"
            exit 1
          fi

          echo "Spúšťam stream na YouTube..."
          
          # OPRAVA ZVUKU:
          # Používame 'amix', aby sme zmiešali zvuk z videa (ak existuje) s generovaným tichom.
          # To zaručí, že YouTube vždy dostane audio stream s bitrate 128k.
          
          ffmpeg -re -stream_loop -1 -i video.mp4 \
          -f lavfi -i anullsrc=channel_layout=stereo:sample_rate=44100 \
          -filter_complex "[0:a][1:a]amix=inputs=2:duration=first:dropout_transition=2[audio_out]" \
          -map 0:v:0 -map "[audio_out]" \
          -c:v libx264 -preset veryfast -b:v 3000k -maxrate 3000k -bufsize 6000k \
          -profile:v main -level 4.1 -bf 0 -pix_fmt yuv420p \
          -r 30 -g 60 -keyint_min 60 -sc_threshold 0 \
          -c:a aac -b:a 128k -ar 44100 -ac 2 \
          -f flv "rtmp://a.rtmp.youtube.com/live2/$YOUTUBE_KEY"
