name: YouTube Live Stream

on:
  workflow_dispatch:
  schedule:
    - cron: '0 19 * * *'

jobs:
  stream:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kódu
        uses: actions/checkout@v4

      - name: Inštalácia FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Stiahnutie videa z Google Drive
        run: |
          FILE_ID="1ZcsuqfFT-HcRg0luL8Q_4oHh_L1EhYEn"
          echo "Sťahujem video z Google Drive (377 MB, ID: $FILE_ID)..."
          
          # 1. Získanie potvrdzovacieho tokenu (Google Drive Virus Scan bypass)
          # Skúšame získať kód 'confirm' z počiatočnej požiadavky
          CONFIRM=$(curl -s -L -c /tmp/cookies "https://docs.google.com/uc?export=download&id=${FILE_ID}" | sed -rn 's/.*confirm=([0-9A-Za-z_]+).*/\1/p')
          
          echo "Potvrdzovací kód: ${CONFIRM:-Nenašiel sa (skúšam priamy download)}"

          # 2. Stiahnutie súboru
          if [ -z "$CONFIRM" ]; then
            # Ak sa kód nenašiel, skúsime to priamo (pre prípady, kedy Google token nevyžiada)
            curl -L -b /tmp/cookies "https://docs.google.com/uc?export=download&id=${FILE_ID}" -o video.mp4
          else
            # Ak máme kód, použijeme ho na finálne stiahnutie
            curl -L -b /tmp/cookies "https://docs.google.com/uc?export=download&confirm=${CONFIRM}&id=${FILE_ID}" -o video.mp4
          fi
          
          # Kontrola integrity: Google pri chybe vráti HTML stránku namiesto videa
          if head -c 100 video.mp4 | grep -q "<html"; then
            echo "CHYBA: Google Drive zamietol automatické stiahnutie (možný limit botov)."
            echo "Prvých 500 znakov odpovede pre diagnostiku:"
            head -c 500 video.mp4
            exit 1
          fi
          
          echo "Súbor úspešne stiahnutý. Veľkosť:"
          du -sh video.mp4

      - name: Streamovanie na YouTube
        env:
          YOUTUBE_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          if [ -z "$YOUTUBE_KEY" ]; then
            echo "CHYBA: YOUTUBE_STREAM_KEY chýba v GitHub Secrets!"
            exit 1
          fi

          echo "Spúšťam stream na YouTube..."
          
          # Optimalizované pre 377MB video a YouTube požiadavky na audio bitrate
          ffmpeg -re -stream_loop -1 -i video.mp4 \
          -f lavfi -i anullsrc=channel_layout=stereo:sample_rate=44100 \
          -filter_complex "[0:a][1:a]amix=inputs=2:duration=first:dropout_transition=2[audio_out]" \
          -map 0:v:0 -map "[audio_out]" \
          -c:v libx264 -preset veryfast -b:v 3000k -maxrate 3000k -bufsize 6000k \
          -profile:v main -level 4.1 -bf 0 -pix_fmt yuv420p \
          -r 30 -g 60 -keyint_min 60 -sc_threshold 0 \
          -c:a aac -b:a 128k -ar 44100 -ac 2 \
          -f flv -flvflags no_duration_filesize "rtmp://a.rtmp.youtube.com/live2/$YOUTUBE_KEY"
