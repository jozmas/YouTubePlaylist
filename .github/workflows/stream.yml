name: YouTube Live Stream

on:
  workflow_dispatch:
  schedule:
    - cron: '0 19 * * *'

jobs:
  stream:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kódu
        uses: actions/checkout@v4

      - name: Rýchla inštalácia FFmpeg (Static Binary)
        run: |
          # Namiesto pomalého apt-get install použijeme statickú binárku, ktorá je pripravená hneď
          echo "Sťahujem statický FFmpeg..."
          wget https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz
          tar -xJf ffmpeg-release-amd64-static.tar.xz
          # Presunieme binárku do pracovného priečinka
          mv ffmpeg-*-amd64-static/ffmpeg ./ffmpeg
          chmod +x ./ffmpeg
          echo "FFmpeg je pripravený."

      - name: Stiahnutie videa
        run: |
          URL="https://www.dropbox.com/scl/fi/lnezxmekrohf1k2g7jd2z/stream.mp4?rlkey=cjns4lvwbfd2vo5m2uirzhikz&st=184iyk1p&dl=1"
          
          echo "Sťahujem video z Dropboxu (377 MB)..."
          curl -L "$URL" -o video.mp4
          
          FILE_SIZE=$(stat -c%s "video.mp4")
          if [ "$FILE_SIZE" -lt 10000000 ]; then
            echo "CHYBA: Súbor je príliš malý. Sťahovanie zlyhalo."
            exit 1
          fi
          echo "Video stiahnuté."

      - name: Streamovanie na YouTube
        env:
          YOUTUBE_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          if [ -z "$YOUTUBE_KEY" ]; then
            echo "CHYBA: YOUTUBE_STREAM_KEY chýba v GitHub Secrets!"
            exit 1
          fi

          echo "Spúšťam stream na YouTube (RTMPS + OBS simulácia)..."
          
          # Používame ./ffmpeg (stiahnutú statickú binárku)
          ./ffmpeg -re -stream_loop -1 -i video.mp4 \
          -c:v libx264 -preset veryfast -tune zerolatency -b:v 3000k -maxrate 3000k -bufsize 6000k \
          -profile:v main -level 4.1 -bf 0 -pix_fmt yuv420p \
          -r 30 -g 60 -keyint_min 60 -sc_threshold 0 \
          -x264-params "nal-hrd=cbr:force-cfr=1:keyint=60:min-keyint=60" \
          -af "volume=0.2" \
          -c:a aac -b:a 128k -ar 44100 -ac 2 \
          -threads 0 \
          -f flv "rtmps://a.rtmp.youtube.com:443/live2/$YOUTUBE_KEY"
