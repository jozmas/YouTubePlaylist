name: DEFINITIVNY VODOPAD TEST

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalacia FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Stiahnutie VODOPADU
        run: |
          # TU NIE JE ZIADNA JASKYNA
          URL="https://www.dropbox.com/scl/fi/t8v82zwuj5oompgrb8voz/waterfall.mp4?rlkey=zo14mr99pihkc1px6b5o0dtl5&raw=1"
          
          # Vymazanie vsetkeho stareho
          rm -rf *.mp4
          
          # Stiahnutie pod uplne novym nazvom
          curl -L "$URL" -o "video_co_nie_je_jaskyna.mp4"
          
          # Vypis informacii o videu do logu (POZRI SI TOTO!)
          ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 video_co_nie_je_jaskyna.mp4

      - name: Streamovanie
        env:
          YOUTUBE_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          ffmpeg -re -stream_loop -1 -i video_co_nie_je_jaskyna.mp4 \
          -c:v libx264 -preset veryfast -b:v 6000k \
          -pix_fmt yuv420p -f flv "rtmp://a.rtmp.youtube.com/live2/$YOUTUBE_KEY"
