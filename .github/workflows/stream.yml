name: YouTube Live Stream

on:
  workflow_dispatch:
  schedule:
    - cron: '0 19 * * *'

jobs:
  stream:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kódu
        uses: actions/checkout@v4

      - name: Inštalácia FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Stiahnutie videa
        run: |
          # Používame Dropbox odkaz (upravený na priame sťahovanie dl=1)
          URL="https://www.dropbox.com/scl/fi/lnezxmekrohf1k2g7jd2z/stream.mp4?rlkey=cjns4lvwbfd2vo5m2uirzhikz&st=184iyk1p&dl=1"
          
          echo "Sťahujem video z Dropboxu (377 MB)..."
          curl -L "$URL" -o video.mp4
          
          # Kontrola, či súbor existuje a má rozumnú veľkosť
          FILE_SIZE=$(stat -c%s "video.mp4")
          if [ "$FILE_SIZE" -lt 10000000 ]; then
            echo "CHYBA: Súbor je príliš malý ($FILE_SIZE bajtov). Sťahovanie zlyhalo."
            exit 1
          fi
          
          echo "Súbor úspešne stiahnutý. Veľkosť:"
          du -sh video.mp4

      - name: Streamovanie na YouTube
        env:
          YOUTUBE_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          if [ -z "$YOUTUBE_KEY" ]; then
            echo "CHYBA: YOUTUBE_STREAM_KEY chýba v GitHub Secrets!"
            exit 1
          fi

          echo "Spúšťam stream na YouTube (Simulácia OBS)..."
          
          # FFmpeg nastavenia vyladené tak, aby presne kopírovali správanie OBS
          ffmpeg -re -stream_loop -1 -i video.mp4 \
          -c:v libx264 -preset veryfast -tune zerolatency -b:v 3000k -maxrate 3000k -bufsize 6000k \
          -pix_fmt yuv420p -g 60 -keyint_min 60 -x264-params "nal-hrd=cbr" \
          -c:a aac -b:a 128k -ar 44100 -ac 2 \
          -f flv "rtmp://a.rtmp.youtube.com/live2/$YOUTUBE_KEY"
