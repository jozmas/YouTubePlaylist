name: YouTube Live Stream

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest

    steps:
      - name: Inštalácia FFmpeg
        run: |
          sudo apt update
          sudo apt install -y ffmpeg curl

      - name: Stiahnutie videa z GitHubu
        run: |
          # Používame správnu RAW URL pre tvoj súbor test.mp4
          URL="https://raw.githubusercontent.com/jozmas/my-images/main/test.mp4"
          
          echo "Sťahujem video test.mp4 z GitHubu..."
          # Sťahujeme súbor priamo pod názvom test.mp4
          curl -L "$URL" -o test.mp4
          
          # Kontrola, či súbor existuje a akú má veľkosť
          if [ ! -f test.mp4 ]; then
            echo "CHYBA: Súbor test.mp4 nebol nájdený po stiahnutí!"
            exit 1
          fi

          SIZE=$(stat -c%s test.mp4)
          echo "Veľkosť súboru: $SIZE bajtov"
          
          if [ "$SIZE" -lt 10000 ]; then
            echo "CHYBA: Súbor je podozrivo malý (pravdepodobne HTML chyba namiesto videa)."
            # Výpis obsahu pre diagnostiku, ak by to bol HTML text
            cat test.mp4 | head -n 5
            exit 1
          fi

      - name: Streamovanie na YouTube
        env:
          YOUTUBE_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          if [ -z "$YOUTUBE_KEY" ]; then
            echo "CHYBA: YOUTUBE_STREAM_KEY chýba v GitHub Secrets!"
            exit 1
          fi

          echo "Spúšťam stream na YouTube so súborom test.mp4..."
          
          # OPRAVA: Premenná -i musí smerovať na test.mp4
          ffmpeg -re -stream_loop -1 -i test.mp4 \
          -c:v libx264 -preset veryfast -b:v 3000k -maxrate 3000k -bufsize 6000k \
          -pix_fmt yuv420p -g 50 -c:a aac -b:a 128k -ar 44100 \
          -f flv "rtmp://a.rtmp.youtube.com/live2/$YOUTUBE_KEY"
