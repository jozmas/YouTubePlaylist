name: YouTube Stream Test

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Install ffmpeg
        run: |
          sudo apt update
          sudo apt install -y ffmpeg curl

      - name: Download test video from Dropbox
        run: |
          echo "Downloading test video..."
          curl -L -o test.mp4 "https://dl.dropboxusercontent.com/s/vwezqye3nsm8r9w9qri1i/test.mp4"

      - name: Validate video
        run: |
          echo "Checking if test.mp4 is valid MP4..."
          file_type=$(file --mime-type -b test.mp4)
          echo "Detected file type: $file_type"
          if [ "$file_type" != "video/mp4" ]; then
            echo "Error: test.mp4 is not a valid MP4!"
            exit 1
          fi
          ls -lh test.mp4

      - name: Start streaming (main server)
        run: |
          ffmpeg -re -stream_loop -1 -i test.mp4 \
          -c:v libx264 -preset veryfast -pix_fmt yuv420p \
          -c:a aac -b:a 128k \
          -f flv "rtmp://a.rtmp.youtube.com/live2/${{ secrets.YT_STREAM_KEY }}"

      - name: Start streaming (backup server)
        run: |
          ffmpeg -re -stream_loop -1 -i test.mp4 \
          -c:v libx264 -preset veryfast -pix_fmt yuv420p \
          -c:a aac -b:a 128k \
          -f flv "rtmp://b.rtmp.youtube.com/live2/${{ secrets.YT_STREAM_KEY }}?backup=1"
