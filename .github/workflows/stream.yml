name: YouTube Live Stream

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest

    steps:
      - name: Inštalácia FFmpeg a nástrojov
        run: |
          sudo apt update
          sudo apt install -y ffmpeg curl

      - name: Stiahnutie videa z Google Drive
        run: |
          # Používame Direct Download link pre Google Drive s tvojím ID súboru
          # Parameter -c (continue) a -L (follow redirects) zabezpečia správne stiahnutie
          curl -L "https://docs.google.com/uc?export=download&id=1ZcsuqfFT-HcRg0luL8Q_4oHh_L1EhYEn" -o video.mp4
          
          # Diagnostika súboru
          FILE_INFO=$(file video.mp4)
          FILE_SIZE=$(ls -lh video.mp4 | awk '{print $5}')
          echo "Detegovaný typ: $FILE_INFO"
          echo "Veľkosť súboru: $FILE_SIZE"
          
          # Ak je súbor príliš malý (napr. Google Drive varovanie o vírusoch pri veľkých súboroch),
          # skúsime stiahnuť súbor s potvrdením (confirm kód)
          if [[ "$FILE_INFO" == *"HTML"* ]]; then
            echo "Detegovaná HTML stránka, pokúšam sa o alternatívne stiahnutie s potvrdením..."
            CONFIRM=$(curl -sc /tmp/gcookie "https://docs.google.com/uc?export=download&id=1ZcsuqfFT-HcRg0luL8Q_4oHh_L1EhYEn" | sed -rn 's/.*confirm=([0-9A-Za-z_]+).*/\1/p')
            curl -Lb /tmp/gcookie "https://docs.google.com/uc?export=download&id=1ZcsuqfFT-HcRg0luL8Q_4oHh_L1EhYEn&confirm=$CONFIRM" -o video.mp4
          fi

      - name: Streamovanie na YouTube
        env:
          # Použije sa tvoj kľúč uložený v GitHub Secrets
          YOUTUBE_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          if [ -z "$YOUTUBE_KEY" ]; then
            echo "CHYBA: YOUTUBE_STREAM_KEY chýba v GitHub Secrets!"
            exit 1
          fi

          echo "Spúšťam stream na YouTube..."
          
          # FFmpeg posiela dáta na YouTube RTMP server
          ffmpeg -re -stream_loop -1 -i video.mp4 \
          -c:v libx264 -preset veryfast -b:v 3000k -maxrate 3000k -bufsize 6000k \
          -pix_fmt yuv420p -g 50 -c:a aac -b:a 128k -ar 44100 \
          -f flv "rtmp://a.rtmp.youtube.com/live2/$YOUTUBE_KEY"
