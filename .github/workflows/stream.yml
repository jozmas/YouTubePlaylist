name: YouTube Live Stream - Relaxing Nature Sounds

on:
  workflow_dispatch:
  schedule:
    - cron: '30 18 * * *' # 20:30 nášho času

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - name: Checkout kódu
        uses: actions/checkout@v4

      - name: Inštalácia FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Výber a stiahnutie videa
        run: |
          # Zoznam videí
          VIDEOS=(
            "https://www.dropbox.com/scl/fi/yh84vqdx3ru1z8gbtet71/stream.mp4?rlkey=yfmjsn2j4wfp0o6q3c83bjbbh&raw=1"
            "https://www.dropbox.com/scl/fi/t8v82zwuj5oompgrb8voz/waterfall.mp4?rlkey=zo14mr99pihkc1px6b5o0dtl5&raw=1"
            "https://www.dropbox.com/scl/fi/kp8qyithsqs2nfonpp1gk/waterfall-stream.mp4?rlkey=caaon46glrb6amltbq8apdlr0&raw=1"
          )
          
          # Výpočet indexu pomocou sekúnd + minút pre ešte lepšiu náhodu
          SEC=$(date +%S)
          MIN=$(date +%M)
          COUNT=${#VIDEOS[@]}
          INDEX=$(( (10#$SEC + 10#$MIN) % COUNT ))
          
          SELECTED_URL=${VIDEOS[$INDEX]}
          
          echo "------------------------------------------"
          echo "LOG: Spustené v čase: $(date +%H:%M:%S)"
          echo "LOG: Vybraný index: $INDEX"
          echo "LOG: Sťahujem URL: $SELECTED_URL"
          echo "------------------------------------------"
          
          # 1. KROK: Úplne vymazať staré video, ak tam zostalo
          rm -f video.mp4
          
          # 2. KROK: Stiahnuť video nanovo
          curl -L "$SELECTED_URL" -o video.mp4
          
          # 3. KROK: Kontrola veľkosti (ak je súbor príliš malý, niečo je zle)
          ls -lh video.mp4

      - name: Streamovanie na YouTube
        env:
          YOUTUBE_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          # Používame -y na automatické prepísanie výstupu, ak by niekde zostal visieť
          ffmpeg -y -nostdin -re -stream_loop -1 -i video.mp4 \
          -c:v libx264 -preset veryfast -tune film \
          -b:v 6000k -maxrate 6000k -bufsize 12000k \
          -pix_fmt yuv420p -g 60 -r 30 \
          -vf "scale=1920:1080,format=yuv420p" \
          -c:a aac -b:a
