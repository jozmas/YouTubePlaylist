name: YouTube Live Stream

on:
  workflow_dispatch:
  schedule:
    # Spustenie každý deň o 19:00 UTC
    - cron: '0 19 * * *'

jobs:
  stream:
    runs-on: ubuntu-latest

    steps:
      - name: Inštalácia FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Kontrola prostredia
        run: |
          ffmpeg -version
          curl --version

      - name: Stiahnutie videa z Google Drive
        run: |
          # ID vášho funkčného súboru na Google Drive
          FILE_ID="1ZcsuqfFT-HcRg0luL8Q_4oHh_L1EhYEn"
          
          echo "Sťahujem video z Google Drive..."
          
          # 1. Získanie potvrdzovacieho kódu pre veľké súbory (obchádza vírusový sken Google)
          CONFIRM=$(curl -sc /tmp/gcookie "https://docs.google.com/uc?export=download&id=${FILE_ID}" | sed -rn 's/.*confirm=([0-9A-Za-z_]+).*/\1/p')
          
          # 2. Stiahnutie samotného súboru pomocou získaného kódu a cookies
          curl -Lb /tmp/gcookie "https://docs.google.com/uc?export=download&confirm=${CONFIRM}&id=${FILE_ID}" -o video.mp4
          
          # Kontrola integrity - ak má súbor menej ako 1MB, stiahnutie zlyhalo
          FILE_SIZE=$(stat -c%s "video.mp4")
          if [ "$FILE_SIZE" -lt 1000000 ]; then
            echo "CHYBA: Stiahnutý súbor je príliš malý ($FILE_SIZE bajtov)."
            echo "Skontrolujte, či je video na Google Drive nastavené na: 'Každý, kto má odkaz'."
            exit 1
          fi
          
          echo "Súbor úspešne stiahnutý. Veľkosť:"
          du -sh video.mp4

      - name: Streamovanie na YouTube
        env:
          YOUTUBE_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          if [ -z "$YOUTUBE_KEY" ]; then
            echo "CHYBA: YOUTUBE_STREAM_KEY chýba v GitHub Secrets!"
            exit 1
          fi

          echo "Spúšťam stream na YouTube..."
          
          # Parametre simulujúce OBS (vysoká kompatibilita, stabilné audio)
          ffmpeg -re -stream_loop -1 -i video.mp4 \
          -f lavfi -i anullsrc=channel_layout=stereo:sample_rate=44100 \
          -filter_complex "[0:a][1:a]amix=inputs=2:duration=first:dropout_transition=2[audio_out]" \
          -map 0:v:0 -map "[audio_out]" \
          -c:v libx264 -preset veryfast -b:v 3000k -maxrate 3000k -bufsize 6000k \
          -profile:v main -level 4.1 -bf 0 -pix_fmt yuv420p \
          -r 30 -g 60 -keyint_min 60 -sc_threshold 0 \
          -c:a aac -b:a 128k -ar 44100 -ac 2 \
          -f flv -flvflags no_duration_filesize "rtmp://a.rtmp.youtube.com/live2/$YOUTUBE_KEY"
