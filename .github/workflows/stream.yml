name: YouTube Live Stream

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest

    steps:
      - name: Inštalácia FFmpeg
        run: |
          sudo apt update
          sudo apt install -y ffmpeg curl

      - name: Stiahnutie videa z GitHubu
        run: |
          URL="https://raw.githubusercontent.com/jozmas/my-images/main/test.mp4"
          echo "Sťahujem video test.mp4 z GitHubu..."
          curl -L "$URL" -o test.mp4
          
          if [ ! -f test.mp4 ]; then
            echo "CHYBA: Súbor test.mp4 nebol nájdený!"
            exit 1
          fi

      - name: Streamovanie na YouTube
        env:
          YOUTUBE_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          if [ -z "$YOUTUBE_KEY" ]; then
            echo "CHYBA: YOUTUBE_STREAM_KEY chýba v GitHub Secrets!"
            exit 1
          fi

          echo "Spúšťam stream na YouTube (Video + Generované ticho)..."
          
          # OPRAVA PRE YOUTUBE:
          # 1. Pridané -flvflags no_duration_filesize, pretože pri live streame dĺžka neexistuje.
          # 2. Pridané -ar 44100 a -ac 2 pre audio, aby sme dodržali štandard.
          # 3. Pridané -f flv s explicitným RTMP cieľom.
          
          ffmpeg -re -stream_loop -1 -i test.mp4 \
          -f lavfi -i anullsrc=channel_layout=stereo:sample_rate=44100 \
          -map 0:v:0 -map 1:a:0 \
          -c:v libx264 -preset superfast -tune zerolatency -b:v 2500k -maxrate 2500k -bufsize 5000k \
          -pix_fmt yuv420p -r 30 -g 60 \
          -c:a aac -b:a 128k -ar 44100 -ac 2 -shortest \
          -flvflags no_duration_filesize \
          -f flv "rtmp://a.rtmp.youtube.com/live2/$YOUTUBE_KEY"
