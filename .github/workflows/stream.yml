name: YouTube Live Stream

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest

    steps:
      - name: Inštalácia FFmpeg
        run: |
          sudo apt update
          sudo apt install -y ffmpeg curl

      - name: Stiahnutie videa z GitHubu
        run: |
          # Sťahujeme priamo z tvojho repozitára my-images
          # Používame "raw" odkaz, aby sme dostali skutočný súbor, nie HTML náhľad
          URL="https://github.com/jozmas/my-images/raw/main/test.mp4"
          
          echo "Sťahujem testovacie video z GitHubu..."
          curl -L "$URL" -o video.mp4
          
          # Kontrola veľkosti
          SIZE=$(stat -c%s video.mp4)
          echo "Veľkosť súboru: $SIZE bajtov"
          
          if [ "$SIZE" -lt 1000 ]; then
            echo "CHYBA: Súbor je príliš malý, pravdepodobne sa nestiahol správne."
            exit 1
          fi

      - name: Streamovanie na YouTube
        env:
          YOUTUBE_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          if [ -z "$YOUTUBE_KEY" ]; then
            echo "CHYBA: YOUTUBE_STREAM_KEY chýba v GitHub Secrets!"
            exit 1
          fi

          echo "Spúšťam stream na YouTube..."
          
          ffmpeg -re -stream_loop -1 -i video.mp4 \
          -c:v libx264 -preset veryfast -b:v 3000k -maxrate 3000k -bufsize 6000k \
          -pix_fmt yuv420p -g 50 -c:a aac -b:a 128k -ar 44100 \
          -f flv "rtmp://a.rtmp.youtube.com/live2/$YOUTUBE_KEY"
