name: TOTALNY RESET STREAMU

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalacia FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Sťahovanie VODOPADU
        run: |
          # Vymazať úplne všetko staré
          rm -rf *.mp4
          
          # Nový link na vodopád
          URL="https://www.dropbox.com/scl/fi/t8v82zwuj5oompgrb8voz/waterfall.mp4?rlkey=zo14mr99pihkc1px6b5o0dtl5&raw=1"
          
          # Uložíme to pod názvom, ktorý neexistoval
          curl -L "$URL" -o "uplne_nove_video_2026.mp4"
          
          # Overíme dĺžku (VODOPÁD má 47 sekúnd, JASKYŇA 249 sekúnd)
          ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 uplne_nove_video_2026.mp4

      - name: Streamovanie
        env:
          YOUTUBE_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          # Používame ten nový názov
          ffmpeg -re -stream_loop -1 -i uplne_nove_video_2026.mp4 \
          -c:v libx264 -preset ultrafast -b:v 4000k \
          -pix_fmt yuv420p -f flv "rtmp://a.rtmp.youtube.com/live2/$YOUTUBE_KEY"
