name: YouTube Live Stream - Relaxing Nature Sounds

on:
  workflow_dispatch:
  schedule:
    - cron: '20 20 * * *' # Spustí sa o 20:20 UTC (20:03 nášho času v zime)

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # Bezpečné ukončenie po 6 hodinách

    steps:
      - name: Checkout kódu
        uses: actions/checkout@v4

      - name: Inštalácia FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg curl

      - name: Stiahnutie videa
        run: |
          URL="https://www.dropbox.com/scl/fi/yh84vqdx3ru1z8gbtet71/stream.mp4?rlkey=yfmjsn2j4wfp0o6q3c83bjbbh&st=vaumjb28&dl=1"
          
          echo "Sťahujem video z Dropboxu (377 MB)..."
          curl -L "$URL" -o video.mp4
          
          FILE_SIZE=$(stat -c%s "video.mp4")
          if [ "$FILE_SIZE" -lt 10000000 ]; then
            echo "CHYBA: Súbor je príliš malý. Sťahovanie zlyhalo."
            exit 1
          fi
          echo "Video úspešne stiahnuté (Veľkosť: $FILE_SIZE bajtov)."

      - name: Streamovanie na YouTube
        env:
          YOUTUBE_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          if [ -z "$YOUTUBE_KEY" ]; then
            echo "CHYBA: YOUTUBE_STREAM_KEY nie je nastavený v Secrets!"
            exit 1
          fi

          echo "Spúšťam stream. Ak sú nastavenia YouTube kľúča správne, prenos bude VEREJNÝ."
          
          ffmpeg -re -stream_loop -1 -i video.mp4 \
          -map 0:v:0 -map 0:a:0 \
          -c:v libx264 -preset veryfast -tune zerolatency -b:v 3000k -maxrate 3000k -bufsize 6000k \
          -profile:v main -level 4.1 -bf 0 -pix_fmt yuv420p \
          -g 50 -keyint_min 50 -sc_threshold 0 \
          -x264-params "nal-hrd=cbr:force-cfr=1" \
          -af "volume=0.2" \
          -c:a aac -b:a 128k -ar 44100 -ac 2 \
          -metadata title="Relaxing Nature Sounds" \
          -f flv "rtmp://a.rtmp.youtube.com/live2/$YOUTUBE_KEY"
