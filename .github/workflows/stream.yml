name: YouTube Live Stream - Relaxing Nature Sounds

on:
  workflow_dispatch:
  schedule:
    - cron: '51 20 * * *' # 21:51 nášho času

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout kódu
        uses: actions/checkout@v4

      - name: Príprava prostredia
        run: |
          sudo apt-get update
          sudo apt-get install -y curl
          ffmpeg -version

      - name: Stiahnutie videa
        run: |
          URL="https://www.dropbox.com/scl/fi/yh84vqdx3ru1z8gbtet71/stream.mp4?rlkey=yfmjsn2j4wfp0o6q3c83bjbbh&st=vaumjb28&raw=1"
          curl -L "$URL" -o video.mp4

      - name: Streamovanie na YouTube
        env:
          YOUTUBE_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          while true; do
            ffmpeg -re -stream_loop -1 -i video.mp4 \
            -map 0:v:0 -map 0:a:0 \
            -vf "scale=1920:1080,format=yuv420p" \
            -r 30 \
            -c:v libx264 -preset veryfast -tune film \
            -b:v 6000k -maxrate 6000k -bufsize 12000k \
            -pix_fmt yuv420p -g 60 \
            -c:a aac -b:a 128k -ac 2 \
            -f flv "rtmp://a.rtmp.youtube.com/live/$YOUTUBE_KEY" || echo "Restarting..."
            sleep 3
          done
