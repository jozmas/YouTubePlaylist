name: YouTube Live Stream

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest

    steps:
      - name: Inštalácia FFmpeg
        run: |
          sudo apt update
          sudo apt install -y ffmpeg curl

      - name: Stiahnutie videa z GitHubu
        run: |
          URL="https://raw.githubusercontent.com/jozmas/my-images/main/test.mp4"
          echo "Sťahujem video test.mp4 z GitHubu..."
          curl -L "$URL" -o test.mp4
          
          if [ ! -f test.mp4 ]; then
            echo "CHYBA: Súbor test.mp4 nebol nájdený!"
            exit 1
          fi

      - name: Streamovanie na YouTube
        env:
          YOUTUBE_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          if [ -z "$YOUTUBE_KEY" ]; then
            echo "CHYBA: YOUTUBE_STREAM_KEY chýba v GitHub Secrets!"
            exit 1
          fi

          echo "Spúšťam stream na YouTube (Simulácia nastavení OBS)..."
          
          # ZMENY PODĽA OBS ŠTANDARDU:
          # 1. -profile:v main -level 4.1: Najkompatibilnejší profil pre YouTube.
          # 2. -bf 0: Vypnutie B-frames pre nižšiu latenciu a lepšiu stabilitu (YouTube ich niekedy "nemá rád" pri štarte).
          # 3. -threads 0: Automatické priradenie jadier pre lepší výkon.
          # 4. Používame opäť rtmp:// (niektoré staršie účty majú s RTMPS na port 443 problém).
          
          ffmpeg -re -stream_loop -1 -i test.mp4 \
          -f lavfi -i anullsrc=channel_layout=stereo:sample_rate=44100 \
          -map 0:v:0 -map 1:a:0 \
          -c:v libx264 -preset veryfast -b:v 3000k -maxrate 3000k -bufsize 6000k \
          -profile:v main -level 4.1 -bf 0 -pix_fmt yuv420p \
          -r 30 -g 60 -keyint_min 60 -sc_threshold 0 \
          -c:a aac -b:a 128k -ar 44100 -ac 2 -shortest \
          -f flv "rtmp://a.rtmp.youtube.com/live2/$YOUTUBE_KEY"
